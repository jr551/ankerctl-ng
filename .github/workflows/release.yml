name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test-web-ui:
    name: Smoke test embedded web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Prepare embedded web vendor assets
        run: bash scripts/prepare-web-vendor.sh

      - name: Build linux test binary
        env:
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w -X main.Version=${{ github.ref_name }}" \
            -o ankerctl-test \
            ./cmd/ankerctl/

      - name: Verify embedded frontend assets
        run: |
          set -euo pipefail
          cfg_dir="$(mktemp -d)"

          ./ankerctl-test --config "$cfg_dir" webserver --listen 127.0.0.1:4470 >webserver.log 2>&1 &
          pid=$!

          cleanup() {
            kill "$pid" >/dev/null 2>&1 || true
            wait "$pid" >/dev/null 2>&1 || true
            rm -rf "$cfg_dir"
          }
          trap cleanup EXIT

          ready=0
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:4470/api/health" >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -eq 0 ]; then
            echo "=== webserver.log ===" && cat webserver.log || true
            echo "Server did not become ready within 30s" && exit 1
          fi

          page="$(curl -fsS "http://127.0.0.1:4470/")"
          # Use herestring/grep-from-file to avoid SIGPIPE with pipefail
          grep -q "ankerctl" <<< "$page"

          # Verify all static assets referenced in the HTML are served
          grep -Eo '/static/[^" ]+' <<< "$page" | sort -u > static-assets.txt
          while read -r asset; do
            curl -fsS "http://127.0.0.1:4470${asset}" >/dev/null
          done < static-assets.txt

          # Explicitly verify custom assets
          grep -q "nav-pills" < <(curl -fsS "http://127.0.0.1:4470/static/ankersrv.css")
          grep -q "fetch"    < <(curl -fsS "http://127.0.0.1:4470/static/ankersrv.js")

          # Explicitly verify all embedded vendor assets (catches missing vendor download)
          grep -q "bootstrap"       < <(curl -fsS "http://127.0.0.1:4470/static/vendor/bootstrap-5.3.0-alpha3-dist/css/bootstrap.min.css")
          grep -q "bootstrap"       < <(curl -fsS "http://127.0.0.1:4470/static/vendor/bootstrap-5.3.0-alpha3-dist/js/bootstrap.bundle.min.js")
          grep -q "bootstrap-icons" < <(curl -fsS "http://127.0.0.1:4470/static/vendor/bootstrap-icons-1.10.5/font/bootstrap-icons.min.css")
          curl -fsS "http://127.0.0.1:4470/static/vendor/bootstrap-icons-1.10.5/font/fonts/bootstrap-icons.woff2" >/dev/null
          grep -q "cash"  < <(curl -fsS "http://127.0.0.1:4470/static/vendor/cash.min.js")
          curl -fsS "http://127.0.0.1:4470/static/vendor/jmuxer.min.js" >/dev/null
          grep -q "Chart" < <(curl -fsS "http://127.0.0.1:4470/static/vendor/chart.umd.min.js")
  build:
    name: Build
    needs: smoke-test-web-ui
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Prepare embedded web vendor assets
        run: bash scripts/prepare-web-vendor.sh

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w -X main.Version=${{ github.ref_name }}" \
            -o ankerctl-${{ matrix.suffix }} \
            ./cmd/ankerctl/

      - name: Package release artifact
        run: |
          set -euo pipefail
          name="ankerctl-${{ matrix.suffix }}"
          mkdir -p package
          cp "$name" package/
          cp README.md package/
          cp -R internal/web/static package/web-static/
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd package && zip -9 -r "../$name.zip" .)
          else
            tar -C package -czf "$name.tar.gz" .
          fi

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ankerctl-${{ matrix.suffix }}
          path: |
            ankerctl-${{ matrix.suffix }}
            ankerctl-${{ matrix.suffix }}.tar.gz
            ankerctl-${{ matrix.suffix }}.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ankerctl-* > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ankerctl-*
            artifacts/SHA256SUMS.txt

  docker:
    name: Docker
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/django1982/ankerctl
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
