<section class="mt-4" id="timelapse">
    <div class="container-fluid px-0">
        <div id="timelapse-disabled-banner" class="alert alert-warning mb-3" style="display:none;">
            <i class="bi-exclamation-triangle px-1"></i>
            Timelapse is disabled. Enable it in <strong>Setup → Timelapse</strong>.
        </div>
        <div class="row g-3">
            <!-- Left: Video player -->
            <div class="col-lg-8">
                <div class="card" id="timelapse-player-card" style="display:none;">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span id="timelapse-player-title" class="text-truncate me-2 fw-semibold"></span>
                        <button type="button" class="btn btn-sm btn-outline-danger timelapse-delete flex-shrink-0" id="timelapse-player-delete">
                            <i class="bi-trash px-1"></i> Delete
                        </button>
                    </div>
                    <div class="card-body p-2">
                        <video id="timelapse-player" controls class="w-100 rounded" style="max-height:500px;"></video>
                        <p class="text-muted small mt-1 mb-0" id="timelapse-player-meta"></p>
                    </div>
                </div>
                <div id="timelapse-player-placeholder" class="card d-flex align-items-center justify-content-center text-muted" style="min-height:300px;">
                    <div class="text-center py-5">
                        <i class="bi bi-play-circle fs-1 d-block mb-2"></i>
                        Select a video to play
                    </div>
                </div>
            </div>
            <!-- Right: Video list -->
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header fs-5">
                        <i class="bi-camera-reels px-1"></i> Timelapse Videos
                    </div>
                    <div id="timelapse-list" class="list-group list-group-flush">
                        <div class="text-center text-muted py-4">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
