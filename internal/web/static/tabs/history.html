<div class="tab-pane fade" id="history" role="tabpanel" aria-labelledby="history-tab">
    <div class="container-fluid mt-3">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card">
                    <div class="card-header fs-5 d-flex justify-content-between align-items-center">
                        <span><i class="bi-clock-history px-1"></i> Print History</span>
                        <button class="btn btn-sm btn-outline-danger" id="history-clear">
                            <i class="bi-trash px-1"></i> Clear
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm mb-0" id="history-table">
                                <thead class="table-light">
                                    <tr>
                                        <th>File</th>
                                        <th>Status</th>
                                        <th>Started</th>
                                        <th>Duration</th>
                                        <th>AI</th>
                                        <th>Hooks</th>
                                    </tr>
                                </thead>
                                <tbody id="history-tbody">
                                    <tr>
                                        <td colspan="6" class="text-center text-muted py-4">
                                            Loading...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <button class="btn btn-sm btn-outline-secondary" id="history-load-more" style="display:none;">
                            Load More
                        </button>
                        <span class="text-muted small" id="history-count"></span>
                    </div>
                </div>

                {{if .VideoSupported}}
                {{template "tabs/timelapse.html" .}}
                {{end}}

            </div>
        </div>
    </div>

    <!-- GCode toolpath viewer (opened from a history row's View button) -->
    <div class="modal fade" id="gcode-viewer-modal" tabindex="-1" aria-hidden="true"
        aria-labelledby="gcode-viewer-title">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-truncate" id="gcode-viewer-title">GCode preview</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="gcode-viewer-stage">
                        <canvas id="gcode-canvas" width="640" height="480" class="w-100 rounded"></canvas>
                        <div id="gcode-viewer-status" class="gcode-viewer-status">Loading…</div>
                    </div>
                    <div class="d-flex align-items-center gap-3 mt-3">
                        <label class="form-label mb-0 small text-nowrap" for="gcode-layer-slider">Layer
                            <span id="gcode-layer-label">–</span></label>
                        <input type="range" class="form-range" id="gcode-layer-slider" min="0" max="0" value="0"
                            disabled aria-label="GCode layer" />
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" role="switch" id="gcode-show-travel" />
                            <label class="form-check-label small text-nowrap" for="gcode-show-travel">Travel</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
