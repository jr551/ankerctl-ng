<div class="tab-pane fade" id="history" role="tabpanel" aria-labelledby="history-tab">
    <div class="container-fluid mt-3">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card">
                    <div class="card-header fs-5 d-flex justify-content-between align-items-center">
                        <span><i class="bi-clock-history px-1"></i> Print History</span>
                        <button class="btn btn-sm btn-outline-danger" id="history-clear">
                            <i class="bi-trash px-1"></i> Clear
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm mb-0" id="history-table">
                                <thead class="table-light">
                                    <tr>
                                        <th>File</th>
                                        <th>Status</th>
                                        <th>Started</th>
                                        <th>Duration</th>
                                        <th>AI</th>
                                        <th>Hooks</th>
                                    </tr>
                                </thead>
                                <tbody id="history-tbody">
                                    <tr>
                                        <td colspan="6" class="text-center text-muted py-4">
                                            Loading...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <button class="btn btn-sm btn-outline-secondary" id="history-load-more" style="display:none;">
                            Load More
                        </button>
                        <span class="text-muted small" id="history-count"></span>
                    </div>
                </div>

                {{if .VideoSupported}}
                {{template "tabs/timelapse.html" .}}
                {{end}}

            </div>
        </div>
    </div>
</div>
